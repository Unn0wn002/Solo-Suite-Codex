name: codeql

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 2"
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Python
    if: github.event.repository.private == false || vars.ENABLE_PRIVATE_CODEQL == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: python
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          category: /language:python
