name: validate-release

"on":
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: solo-suite-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install hash-locked validation dependencies
        run: python -m pip install --require-hashes --requirement requirements-dev.lock

      - name: Compile Python sources
        run: python -m compileall -q plugins tests tools

      - name: Validate every Codex plugin directory
        run: python tools/validate_plugins.py --official-if-available

      - name: Unit and regression tests with coverage
        run: |
          coverage run --source=plugins,tools -m unittest discover -s tests -t . -v
          coverage report --show-missing --fail-under=68

      - name: Structural suite self-check
        run: python plugins/solo/skills/suite-integrity/scripts/self_check.py . -

      - name: AgentRooms schema and semantic validation
        run: python plugins/ai/skills/agent-room-templates/scripts/validate_rooms.py --suite .

      - name: Secret-output regressions
        run: python -m unittest tests.test_runtime_security_v111.SecretScannerRegression -v

      - name: Installed-CWD regressions
        run: python -m unittest tests.test_runtime_security_v111.InstalledPathRegression -v

      - name: Repository secret scan
        run: python plugins/site-doctor/scripts/run_helper.py security-review/scan-secrets . --json

      - name: Build deterministic release package
        run: python tools/package_release.py --output dist/solo-suite-codex-v1.0.12.zip --validation-state ci

      - name: Verify packaging did not rewrite tracked source
        run: |
          git diff --exit-code
          python -c 'import subprocess, sys; status = subprocess.check_output(["git", "status", "--porcelain", "--untracked-files=all"], text=True); print(status, end=""); sys.exit(1 if status.strip() else 0)'

      - name: Packaged ZIP clean-room smoke test
        run: python tools/smoke_package.py dist/solo-suite-codex-v1.0.12.zip
